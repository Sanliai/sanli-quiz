<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三力诊断 · 管理后台</title>
<style>
  :root { --bg:#08090c; --card:#15171e; --border:#23262f; --text:#e4e2df; --text2:#a0a0b2; --text3:#636378; --accent:#C4A265; --brand:#D4A56A; --channel:#7CA0B8; --data:#6BAF99; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); padding:24px; }
  h1 { font-size:22px; margin-bottom:6px; }
  h1 span { font-size:13px; color:var(--text3); font-weight:400; margin-left:8px; }
  .stats { display:flex; gap:16px; margin:20px 0; flex-wrap:wrap; }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px 20px; min-width:120px; }
  .stat-card .val { font-size:28px; font-weight:700; color:var(--accent); }
  .stat-card .lbl { font-size:11px; color:var(--text3); margin-top:2px; }
  table { width:100%; border-collapse:collapse; margin-top:16px; font-size:13px; }
  th { text-align:left; padding:10px 12px; border-bottom:1px solid var(--border); color:var(--text3); font-weight:500; font-size:11px; letter-spacing:1px; }
  td { padding:10px 12px; border-bottom:1px solid var(--border); color:var(--text2); }
  tr:hover td { background:rgba(196,162,101,0.04); }
  .tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
  .tag-brand { background:rgba(212,165,106,0.12); color:var(--brand); }
  .tag-channel { background:rgba(124,160,184,0.12); color:var(--channel); }
  .tag-data { background:rgba(107,175,153,0.12); color:var(--data); }
  .tag-type { background:rgba(196,162,101,0.12); color:var(--accent); }
  .empty { text-align:center; padding:60px 20px; color:var(--text3); }
  .refresh { background:var(--accent); color:#0a0a0f; border:none; padding:8px 20px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; float:right; margin-top:-32px; }
</style>
</head>
<body>
<h1>三力诊断 · 管理后台<span id="totalLabel"></span></h1>
<button class="refresh" onclick="loadData()">刷新</button>
<div class="stats" id="statsArea"></div>
<table>
  <thead><tr>
    <th>时间</th><th>称呼</th><th>行业</th><th>品牌</th>
    <th>品牌力</th><th>渠道力</th><th>数据力</th><th>类型</th><th>卦</th>
  </tr></thead>
  <tbody id="tbody"></tbody>
</table>
<div class="empty" id="emptyMsg" style="display:none">暂无提交数据</div>

<script>
async function loadData() {
  try {
    const [subRes, statsRes] = await Promise.all([
      fetch('/api/submissions').then(r=>r.json()),
      fetch('/api/stats').then(r=>r.json())
    ]);

    // Stats
    const s = statsRes;
    document.getElementById('totalLabel').textContent = `共 ${s.total} 条`;
    document.getElementById('statsArea').innerHTML = `
      <div class="stat-card"><div class="val">${s.total}</div><div class="lbl">总提交</div></div>
      <div class="stat-card"><div class="val">${s.avgScores ? Math.round(s.avgScores.avg_brand) : '-'}</div><div class="lbl">均品牌力</div></div>
      <div class="stat-card"><div class="val">${s.avgScores ? Math.round(s.avgScores.avg_channel) : '-'}</div><div class="lbl">均渠道力</div></div>
      <div class="stat-card"><div class="val">${s.avgScores ? Math.round(s.avgScores.avg_data) : '-'}</div><div class="lbl">均数据力</div></div>
    `;

    // Table
    const tbody = document.getElementById('tbody');
    const emptyMsg = document.getElementById('emptyMsg');
    if (!subRes.length) { tbody.innerHTML=''; emptyMsg.style.display='block'; return; }
    emptyMsg.style.display='none';
    tbody.innerHTML = subRes.map(r=>`<tr>
      <td>${r.created_at}</td>
      <td>${r.user_name}</td>
      <td>${r.industry}</td>
      <td>${r.brand_name}</td>
      <td><span class="tag tag-brand">${r.brand_score}</span></td>
      <td><span class="tag tag-channel">${r.channel_score}</span></td>
      <td><span class="tag tag-data">${r.data_score}</span></td>
      <td><span class="tag tag-type">${r.base_type}</span></td>
      <td>${r.hexagram}</td>
    </tr>`).join('');
  } catch(err) {
    console.error(err);
    document.getElementById('emptyMsg').style.display='block';
    document.getElementById('emptyMsg').textContent = '加载失败: ' + err.message;
  }
}
loadData();
</script>
</body>
</html>
